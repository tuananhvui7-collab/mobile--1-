<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Gio hang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Gio hang cua toi</h3>

    <!-- Kiem tra gio co rong khong -->
    <div th:if="${cart.items == null or cart.items.empty}"
         class="alert alert-info">
        Gio hang trong! <a th:href="@{/products}">Mua sam ngay</a>
    </div>

    <!-- Hien thi danh sach san pham trong gio -->
    <div th:unless="${cart.items == null or cart.items.empty}">
        <table class="table">
            <thead>
                <tr>
                    <th>San pham</th>
                    <th>Don gia</th>
                    <th>So luong</th>
                    <th>Thanh tien</th>
                    <th>Thao tac</th>
                </tr>
            </thead>
            <tbody>
                <!-- th:each: lap qua tung CartItem trong gio -->
                <tr th:each="item : ${cart.items}">
                    <td th:text="${item.productName}"></td>
                    <!-- #numbers.formatDecimal: dinh dang so: 29,990,000 -->
                    <td th:text="${#numbers.formatDecimal(item.unitPrice,0,'COMMA',0,'POINT')}"></td>
                    <td>
                        <!-- Form cap nhat so luong -->
                        <form th:action="@{/cart/update/{id}(id=${item.cartItemId})}"
                              method="post" class="d-flex">
                            <input type="number" name="quantity"
                                   th:value="${item.quantity}"
                                   min="1" class="form-control form-control-sm"
                                   style="width:70px">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-secondary ms-1">
                                Cap nhat
                            </button>
                        </form>
                    </td>
                    <td th:text="${#numbers.formatDecimal(item.subtotal,0,'COMMA',0,'POINT')}"></td>
                    <td>
                        <!-- Form xoa san pham khoi gio -->
                        <form th:action="@{/cart/remove/{id}(id=${item.cartItemId})}"
                              method="post">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-danger">Xoa</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Tong tien va nut thanh toan -->
        <div class="d-flex justify-content-end">
            <div class="text-end">
                <h5>Tong tien:
                    <span th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')}"></span>
                    VND
                </h5>
                <a th:href="@{/orders/checkout}" class="btn btn-primary">
                    Tien hanh dat hang
                </a>
            </div>
        </div>
    </div>
</div>
</body></html>
