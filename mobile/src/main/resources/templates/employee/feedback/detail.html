<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết phản hồi — PhoneShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <h3 class="mb-0">Chi tiết phản hồi</h3>
            <div class="text-muted small" th:text="${feedback.feedbackId}">#1</div>
        </div>
        <a th:href="@{/employee/feedbacks}" class="btn btn-outline-secondary">Quay lại</a>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="text-muted small">Khách hàng</div>
                    <div class="fw-semibold" th:text="${feedback.customer != null ? feedback.customer.fullName : '—'}">—</div>
                </div>
                <div class="col-md-4">
                    <div class="text-muted small">Trạng thái</div>
                    <div class="fw-semibold" th:text="${feedback.status}">PENDING</div>
                </div>
                <div class="col-md-4">
                    <div class="text-muted small">Ngày tạo</div>
                    <div class="fw-semibold" th:text="${feedback.createdAt != null ? #temporals.format(feedback.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">—</div>
                </div>
                <div class="col-12">
                    <div class="text-muted small">Nội dung</div>
                    <div class="fw-semibold" th:text="${feedback.content}">Content</div>
                </div>
                <div class="col-12" th:if="${feedback.resolution != null}">
                    <div class="text-muted small">Xử lý</div>
                    <div class="fw-semibold" th:text="${feedback.resolution}">Resolution</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Hành động</h5>
            <div class="d-flex gap-2 flex-wrap mb-3">
                <form th:if="${feedback.employee == null}" th:action="@{/employee/feedbacks/{id}/assign(id=${feedback.feedbackId})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-primary">Nhận xử lý</button>
                </form>
            </div>

            <form th:action="@{/employee/feedbacks/{id}/resolve(id=${feedback.feedbackId})}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nội dung xử lý</label>
                    <textarea name="resolution" class="form-control" rows="5" required
                              th:text="${feedback.resolution != null ? feedback.resolution : ''}"></textarea>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-success">Đánh dấu đã xử lý</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
