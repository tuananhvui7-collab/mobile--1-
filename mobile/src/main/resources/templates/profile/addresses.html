<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Địa chỉ — PhoneShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 960px;">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <h3 class="mb-0">Địa chỉ của tôi</h3>
            <div class="text-muted small">Quản lý địa chỉ giao hàng đã lưu</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/profile}" class="btn btn-outline-secondary">Hồ sơ</a>
            <a th:href="@{/profile/addresses/add}" class="btn btn-primary">Thêm địa chỉ</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${addresses == null or addresses.isEmpty()}" class="alert alert-info">
        Bạn chưa có địa chỉ nào. Hãy thêm địa chỉ đầu tiên.
    </div>

    <div class="row g-3" th:if="${addresses != null and !addresses.isEmpty()}">
        <div class="col-md-6" th:each="address : ${addresses}">
            <div class="card shadow-sm h-100" th:classappend="${address.isDefault} ? ' border-primary' : ''">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <div>
                            <h5 class="card-title mb-1">
                                <span th:text="${address.street}">Street</span>
                                <span th:if="${address.isDefault}" class="badge bg-primary ms-2">Mặc định</span>
                            </h5>
                            <div class="text-muted small">
                                <span th:text="${address.phone != null ? address.phone : '—'}">—</span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-3 small">
                        <div th:text="${address.ward != null ? address.ward : ''}"></div>
                        <div th:text="${address.district != null ? address.district : ''}"></div>
                        <div th:text="${address.city != null ? address.city : ''}"></div>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 pt-0 pb-3 px-3 d-flex flex-wrap gap-2">
                    <a th:href="@{/profile/addresses/{id}/edit(id=${address.addressId})}" class="btn btn-sm btn-outline-primary">Sửa</a>
                    <form th:if="${!address.isDefault}" th:action="@{/profile/addresses/{id}/default(id=${address.addressId})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-outline-success">Đặt mặc định</button>
                    </form>
                    <form th:action="@{/profile/addresses/{id}/delete(id=${address.addressId})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa địa chỉ này?')">Xóa</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
