<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ — PhoneShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4 mb-5" style="max-width: 560px;">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h3 class="mb-0">Thông tin tài khoản</h3>
        <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm">Về cửa hàng</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">Cập nhật thông tin</h5>
            <form th:action="@{/profile}" method="post">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:value="${customer.email}" disabled>
                    <div class="form-text">Email dùng để đăng nhập, không đổi tại đây.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" name="fullName" class="form-control" required
                           th:value="${customer.fullName}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Số điện thoại</label>
                    <input type="tel" name="phone" class="form-control"
                           th:value="${customer.phone}">
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary">Lưu thông tin</button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <h5 class="card-title mb-1">Địa chỉ giao hàng</h5>
                <div class="text-muted small">Quản lý danh sách địa chỉ đã lưu</div>
            </div>
            <a th:href="@{/profile/addresses}" class="btn btn-outline-primary">Quản lý địa chỉ</a>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <h5 class="card-title mb-1">Chăm sóc khách hàng</h5>
                <div class="text-muted small">Gửi phản hồi, khiếu nại hoặc câu hỏi cho shop</div>
            </div>
            <a th:href="@{/profile/feedbacks}" class="btn btn-outline-primary">Mở phản hồi của tôi</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Đổi mật khẩu</h5>
            <form th:action="@{/profile/password}" method="post">
                <div class="mb-3">
                    <label class="form-label">Mật khẩu hiện tại</label>
                    <input type="password" name="oldPassword" class="form-control" required autocomplete="current-password">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu mới</label>
                    <input type="password" name="newPassword" class="form-control" required autocomplete="new-password">
                </div>
                <div class="mb-3">
                    <label class="form-label">Nhập lại mật khẩu mới</label>
                    <input type="password" name="confirmPassword" class="form-control" required autocomplete="new-password">
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-warning">Đổi mật khẩu</button>
            </form>
        </div>
    </div>

    <form th:action="@{/logout}" method="post" class="mt-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-outline-danger">Đăng xuất</button>
    </form>
</div>
</body>
</html>
