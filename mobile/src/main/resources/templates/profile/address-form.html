<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Địa chỉ — PhoneShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 720px;">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h3 class="mb-0" th:text="${title}">Địa chỉ</h3>
        <a th:href="@{/profile/addresses}" class="btn btn-outline-secondary">Quay lại</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${action}" method="post">
                <div class="mb-3">
                    <label class="form-label">Số nhà, đường</label>
                    <input type="text" name="street" class="form-control" required th:value="${address.street}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phường / Xã</label>
                    <input type="text" name="ward" class="form-control" th:value="${address.ward}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Quận / Huyện</label>
                    <input type="text" name="district" class="form-control" th:value="${address.district}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Tỉnh / Thành phố</label>
                    <input type="text" name="city" class="form-control" required th:value="${address.city}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Số điện thoại</label>
                    <input type="tel" name="phone" class="form-control" th:value="${address.phone}">
                </div>
                <div class="form-check mb-3" th:if="${mode == 'create'}">
                    <input class="form-check-input" type="checkbox" name="setDefault" value="true" id="setDefault">
                    <label class="form-check-label" for="setDefault">Đặt làm địa chỉ mặc định</label>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary">Lưu địa chỉ</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
