<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phản hồi của tôi — PhoneShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 960px;">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <h3 class="mb-0">Phản hồi của tôi</h3>
            <div class="text-muted small">Gửi câu hỏi, khiếu nại hoặc góp ý cho shop</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/profile}" class="btn btn-outline-secondary">Hồ sơ</a>
            <a th:href="@{/profile/feedbacks/new}" class="btn btn-primary">Gửi phản hồi</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${feedbacks == null or feedbacks.isEmpty()}" class="alert alert-info">
        Bạn chưa có phản hồi nào.
    </div>

    <div class="vstack gap-3" th:if="${feedbacks != null and !feedbacks.isEmpty()}">
        <div class="card shadow-sm" th:each="fb : ${feedbacks}">
            <div class="card-body">
                <div class="d-flex justify-content-between flex-wrap gap-2 mb-2">
                    <div>
                        <div class="fw-semibold" th:text="${fb.status}">PENDING</div>
                        <div class="text-muted small" th:text="${fb.createdAt != null ? #temporals.format(fb.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">—</div>
                    </div>
                    <div class="text-muted small" th:text="${fb.employee != null ? ('Đang xử lý bởi: ' + fb.employee.fullName) : 'Chưa có nhân viên xử lý'}"></div>
                </div>
                <p class="mb-2" th:text="${fb.content}">Nội dung</p>
                <div th:if="${fb.resolution != null and !fb.resolution.isBlank()}" class="alert alert-success mb-0">
                    <div class="fw-semibold mb-1">Phản hồi từ shop</div>
                    <div th:text="${fb.resolution}"></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
