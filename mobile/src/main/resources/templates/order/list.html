<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đơn hàng của tôi - PhoneShop')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container ps-shell">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <div class="ps-soft-badge mb-2">Customer</div>
            <h1 class="ps-page-title mb-1">Đơn hàng của tôi</h1>
            <div class="ps-page-subtitle">Theo dõi lịch sử mua sắm và trạng thái thanh toán.</div>
        </div>
        <a th:href="@{/products}" class="btn btn-outline-primary ps-btn-pill">Tiếp tục mua sắm</a>
    </div>

    <div th:replace="~{fragments/layout :: flash}"></div>

    <div th:if="${orders == null or orders.isEmpty()}" class="alert alert-info ps-alert">
        Bạn chưa có đơn hàng nào.
    </div>

    <div class="row g-3 g-lg-4" th:if="${orders != null and !orders.isEmpty()}">
        <div class="col-12" th:each="order : ${orders}">
            <div class="ps-card p-4">
                <div class="row g-3 align-items-center">
                    <div class="col-lg-4">
                        <div class="d-flex align-items-start gap-3">
                            <div class="ps-cart-thumb d-none d-md-flex">O</div>
                            <div>
                                <div class="fw-bold h6 mb-1" th:text="${order.orderCode}">ORD-0000</div>
                                <div class="ps-muted small">ID #<span th:text="${order.orderId}">0</span></div>
                                <div class="small ps-muted" th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">—</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="d-flex flex-wrap gap-2 mb-2">
                            <span class="badge rounded-pill px-3 py-2"
                                  th:classappend="${order.status.toString() == 'DELIVERED'} ? ' text-bg-success' : (${order.status.toString() == 'CANCELLED'} ? ' text-bg-danger' : ' text-bg-warning text-dark')"
                                  th:text="${order.status}">PENDING</span>
                            <span class="badge rounded-pill text-bg-light text-dark border px-3 py-2" th:text="${order.paymentMethod}">COD</span>
                            <span class="badge rounded-pill text-bg-light text-dark border px-3 py-2" th:text="${order.latestPayment != null ? order.latestPayment.status : '—'}">PENDING</span>
                        </div>
                        <div class="ps-muted small">Tổng tiền</div>
                        <div class="fw-bold text-primary" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">0</div>
                    </div>
                    <div class="col-lg-4">
                        <div class="d-flex flex-wrap gap-2 justify-content-lg-end">
                            <a th:href="@{/orders/{id}(id=${order.orderId})}" class="btn btn-sm btn-primary ps-btn-pill">Chi tiết</a>
                            <a th:if="${order.status.toString() != 'PENDING'}"
                               th:href="@{/orders/{id}/tracking(id=${order.orderId})}"
                               class="btn btn-sm btn-outline-primary ps-btn-pill">Theo dõi</a>
                            <form th:if="${order.status.toString() == 'PENDING' or order.status.toString() == 'CONFIRMED'}"
                                  th:action="@{/orders/{id}/cancel(id=${order.orderId})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="reason" value="Khách hàng hủy từ danh sách đơn">
                                <button type="submit" class="btn btn-sm btn-outline-danger ps-btn-pill"
                                        onclick="return confirm('Bạn chắc chắn muốn hủy đơn hàng này?');">
                                    Hủy
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
