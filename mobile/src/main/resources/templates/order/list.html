<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">Đơn hàng của tôi</h3>
        <a th:href="@{/products}" class="btn btn-outline-primary">Tiếp tục mua sắm</a>
    </div>

    <div th:if="${orders == null or orders.isEmpty()}" class="alert alert-info">
        Bạn chưa có đơn hàng nào.
    </div>

    <div th:if="${orders != null and !orders.isEmpty()}" class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead class="table-light">
            <tr>
                <th>Mã đơn</th>
                <th>Ngày tạo</th>
                <th>Trạng thái</th>
                <th>Thanh toán</th>
                <th>TT thanh toán</th>
                <th>Tổng tiền</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.orderCode}">ORD-0000</td>
                <td th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">—</td>
                <td th:text="${order.status}">PENDING</td>
                <td th:text="${order.paymentMethod}">COD</td>
                <td th:text="${order.latestPayment != null ? order.latestPayment.status : '—'}">PENDING</td>
                <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}">0</td>
                <td class="text-end">
                    <a th:href="@{/orders/{id}(id=${order.orderId})}" class="btn btn-sm btn-primary">Chi tiết</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
