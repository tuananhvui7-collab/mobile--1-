<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Dat hang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Thong tin dat hang</h3>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/orders/place}" method="post">
        <!-- cartId la bien an -- truyen gio hang hien tai -->
        <input type="hidden" name="cartId" th:value="${cart.cartId}">

        <div class="mb-3">
            <label class="form-label">Ten nguoi nhan</label>
            <input type="text" name="shippingName" class="form-control"
                   th:value="${customer.fullName}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">So dien thoai</label>
            <input type="tel" name="shippingPhone" class="form-control"
                   th:value="${customer.phone}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Dia chi</label>
            <input type="text" name="shippingAddress" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Tinh / Thanh pho</label>
            <input type="text" name="shippingCity" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ma voucher (neu co)</label>
            <input type="text" name="voucherCode" class="form-control"
                   placeholder="Nhap ma voucher...">
        </div>
        <div class="mb-3">
            <label class="form-label">Phuong thuc thanh toan</label>
            <select name="paymentMethod" class="form-select">
                <option value="COD">Thu tien khi nhan hang (COD)</option>
                <option value="VN_PAY">Thanh toan online qua VNPAY</option>
            </select>
        </div>

        <!-- CSRF token bat buoc -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <button type="submit" class="btn btn-success w-100">
            Xac nhan dat hang
        </button>
    </form>
</div>
</body></html>
