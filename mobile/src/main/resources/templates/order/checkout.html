<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Dat hang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>Thong tin dat hang</h3>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${addresses == null or addresses.isEmpty()}" class="alert alert-info">
        Bạn chưa có địa chỉ đã lưu. Hãy <a th:href="@{/profile/addresses}">thêm địa chỉ</a> trước khi đặt hàng.
    </div>

    <div class="card mb-4" th:if="${addresses != null}">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h5 class="card-title mb-1">Chọn địa chỉ đã lưu</h5>
                    <div class="text-muted small">Dùng một địa chỉ có sẵn để điền nhanh thông tin giao hàng</div>
                </div>
                <a th:href="@{/profile/addresses}" class="btn btn-outline-primary btn-sm">Quản lý địa chỉ</a>
            </div>
            <form th:action="@{/orders/checkout}" method="get" class="row g-2 mt-3">
                <div class="col-md-9">
                    <select name="addressId" class="form-select">
                        <option value="">-- Chọn địa chỉ --</option>
                        <option th:each="address : ${addresses}"
                                th:value="${address.addressId}"
                                th:selected="${selectedAddressId != null and selectedAddressId == address.addressId}"
                                th:text="${address.street + (address.ward != null ? ', ' + address.ward : '') + (address.district != null ? ', ' + address.district : '') + (address.city != null ? ', ' + address.city : '')}">
                        </option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-outline-secondary w-100">Dùng địa chỉ này</button>
                </div>
            </form>
        </div>
    </div>

    <form th:action="@{/orders/place}" method="post">
        <!-- cartId la bien an -- truyen gio hang hien tai -->
        <input type="hidden" name="cartId" th:value="${cart.cartId}">

        <div class="mb-3">
            <label class="form-label">Ten nguoi nhan</label>
            <input type="text" name="shippingName" class="form-control"
                   th:value="${shippingName != null and !shippingName.isBlank() ? shippingName : customer.fullName}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">So dien thoai</label>
            <input type="tel" name="shippingPhone" class="form-control"
                   th:value="${shippingPhone != null and !shippingPhone.isBlank() ? shippingPhone : customer.phone}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Dia chi</label>
            <input type="text" name="shippingAddress" class="form-control"
                   th:value="${shippingAddress}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Phường / Xã</label>
            <input type="text" name="shippingWard" class="form-control"
                   th:value="${shippingWard}">
        </div>
        <div class="mb-3">
            <label class="form-label">Quận / Huyện</label>
            <input type="text" name="shippingDistrict" class="form-control"
                   th:value="${shippingDistrict}">
        </div>
        <div class="mb-3">
            <label class="form-label">Tinh / Thanh pho</label>
            <input type="text" name="shippingCity" class="form-control"
                   th:value="${shippingCity}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ma voucher (neu co)</label>
            <input type="text" name="voucherCode" class="form-control"
                   placeholder="Nhap ma voucher...">
        </div>
        <div class="mb-3">
            <label class="form-label">Phuong thuc thanh toan</label>
            <select name="paymentMethod" class="form-select">
                <option value="COD">Thu tien khi nhan hang (COD)</option>
                <option value="VN_PAY">Thanh toan online qua VNPAY</option>
            </select>
        </div>

        <!-- CSRF token bat buoc -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <button type="submit" class="btn btn-success w-100">
            Xac nhan dat hang
        </button>
    </form>
</div>
</body></html>
