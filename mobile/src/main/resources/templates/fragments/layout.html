<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">PhoneShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/phoneshop.css}">
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark ps-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
            <span class="ps-brand-mark">P</span>
            <span>PhoneShop</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#psNavbar" aria-controls="psNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="psNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-1">
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">Sản phẩm</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('CUSTOMER')"><a class="nav-link" th:href="@{/cart}">Giỏ hàng</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('CUSTOMER')"><a class="nav-link" th:href="@{/orders}">Đơn hàng</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('CUSTOMER')"><a class="nav-link" th:href="@{/profile}">Hồ sơ</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('EMPLOYEE')"><a class="nav-link" th:href="@{/employee/dashboard}">Dashboard</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('EMPLOYEE')"><a class="nav-link" th:href="@{/employee/orders}">Đơn hàng</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('EMPLOYEE')"><a class="nav-link" th:href="@{/employee/feedbacks}">Phản hồi</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('MANAGER')"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('MANAGER')"><a class="nav-link" th:href="@{/admin/products}">Sản phẩm</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('MANAGER')"><a class="nav-link" th:href="@{/admin/orders}">Đơn hàng</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('MANAGER')"><a class="nav-link" th:href="@{/admin/employees}">Nhân viên</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and hasRole('MANAGER')"><a class="nav-link" th:href="@{/admin/reports}">Báo cáo</a></li>
            </ul>

            <div class="d-flex flex-wrap gap-2 align-items-center">
                <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-sm btn-light">Đăng nhập</a>
                <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="btn btn-sm btn-outline-light">Đăng ký</a>

                <a sec:authorize="isAuthenticated() and hasRole('CUSTOMER')" th:href="@{/cart}" class="btn btn-sm btn-outline-light">Cart</a>
                <a sec:authorize="isAuthenticated()" th:href="@{/logout}" class="btn btn-sm btn-warning">Đăng xuất</a>
            </div>
        </div>
    </div>
</nav>

<div th:fragment="flash" class="vstack gap-2 mb-4">
    <div th:if="${success}" class="alert alert-success ps-alert mb-0" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger ps-alert mb-0" th:text="${error}"></div>
    <div th:if="${info}" class="alert alert-info ps-alert mb-0" th:text="${info}"></div>
</div>

<footer th:fragment="footer" class="ps-footer mt-5">
    <div class="container py-4 d-flex flex-column flex-md-row align-items-center justify-content-between gap-2">
        <div>
            <div class="fw-bold">PhoneShop</div>
            <div class="small text-white-50">E-commerce app - responsive polish sprint</div>
        </div>
        <div class="small text-white-50">Built for customers, employees, and managers.</div>
    </div>
</footer>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
</html>
