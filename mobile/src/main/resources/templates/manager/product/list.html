<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manager - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1">Quản lý sản phẩm</h2>
            <p class="text-muted mb-0">Danh sách sản phẩm để test luồng manager.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/admin/products/create}">Tạo sản phẩm</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Hãng</th>
                    <th>Danh mục</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="7" class="text-center text-muted py-4">Chưa có sản phẩm nào</td>
                </tr>
                <tr th:each="product : ${products}">
                    <td th:text="${product.productId}">1</td>
                    <td th:text="${product.name}">iPhone</td>
                    <td th:text="${product.brand}">Apple</td>
                    <td th:text="${product.category != null ? product.category.name : '-'}">Phone</td>
                    <td>
                        <span class="badge"
                              th:classappend="${product.status.name() == 'ACTIVE'} ? ' text-bg-success' : ' text-bg-secondary'"
                              th:text="${product.status}">ACTIVE</span>
                    </td>
                    <td th:text="${product.createdAt}">2026-03-30T10:00</td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/products/{id}(id=${product.productId})}">Detail</a>
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/products/{id}/edit(id=${product.productId})}">Edit</a>
                        <form class="d-inline" th:if="${product.status.name() == 'ACTIVE'}"
                              th:action="@{/admin/products/{id}/delete(id=${product.productId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Hide</button>
                        </form>
                        <form class="d-inline" th:if="${product.status.name() != 'ACTIVE'}"
                              th:action="@{/admin/products/{id}/restore(id=${product.productId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-success" type="submit">Restore</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
