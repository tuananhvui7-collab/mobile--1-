<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý sản phẩm - PhoneShop')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container ps-shell">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <div class="ps-soft-badge mb-2">Manager</div>
            <h1 class="ps-page-title mb-1">Quản lý sản phẩm</h1>
            <p class="ps-page-subtitle mb-0">Danh sách sản phẩm để test luồng manager.</p>
        </div>
        <a class="btn btn-primary ps-btn-pill" th:href="@{/admin/products/create}">Tạo sản phẩm</a>
    </div>

    <div class="ps-card overflow-hidden">
        <div class="table-responsive">
            <table class="table ps-table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Tên</th>
                    <th>Hãng</th>
                    <th>Danh mục</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th class="text-end pe-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="7" class="text-center text-muted py-4">Chưa có sản phẩm nào</td>
                </tr>
                <tr th:each="product : ${products}">
                    <td class="ps-4" th:text="${product.productId}">1</td>
                    <td th:text="${product.name}">iPhone</td>
                    <td th:text="${product.brand}">Apple</td>
                    <td th:text="${product.category != null ? product.category.name : '-'}">Phone</td>
                    <td>
                        <span class="badge"
                              th:classappend="${product.status.name() == 'ACTIVE'} ? ' text-bg-success' : ' text-bg-secondary'"
                              th:text="${product.status}">ACTIVE</span>
                    </td>
                    <td th:text="${product.createdAt}">2026-03-30T10:00</td>
                    <td class="text-end pe-4">
                        <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/products/{id}(id=${product.productId})}">Detail</a>
                        <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/products/{id}/edit(id=${product.productId})}">Edit</a>
                        <form class="d-inline" th:if="${product.status.name() == 'ACTIVE'}"
                              th:action="@{/admin/products/{id}/delete(id=${product.productId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Hide</button>
                        </form>
                        <form class="d-inline" th:if="${product.status.name() != 'ACTIVE'}"
                              th:action="@{/admin/products/{id}/restore(id=${product.productId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-success" type="submit">Restore</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
