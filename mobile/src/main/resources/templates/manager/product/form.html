<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manager - Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="mb-3 d-flex gap-2">
        <a class="btn btn-outline-secondary" th:href="@{/admin/products}">Back</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="mb-4">Product form</h2>

            <form th:action="@{/admin/products/save}" th:object="${form}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{productId}">

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Category</label>
                        <select class="form-select" th:field="*{categoryId}">
                            <option value="">-- Select category --</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.categoryId}"
                                    th:text="${category.name}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" th:field="*{name}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Brand</label>
                        <input type="text" class="form-control" th:field="*{brand}">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Status</label>
                        <select class="form-select" th:field="*{status}">
                            <option th:value="${T(com.ecommerce.mobile.enums.ProductStatus).ACTIVE}">ACTIVE</option>
                            <option th:value="${T(com.ecommerce.mobile.enums.ProductStatus).INACTIVE}">INACTIVE</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h4 class="mb-0">Variants</h4>
                    <span class="text-muted">This form renders the full tree with nested images.</span>
                </div>

                <div th:each="variant, vStat : *{variants}" class="border rounded p-3 mb-3 bg-white"
                     th:with="vIndex=${vStat.index}">
                    <input type="hidden" th:field="*{variants[__${vIndex}__].variantId}">

                    <div class="row g-3">
                        <div class="col-md-2">
                            <label class="form-label">Storage GB</label>
                            <input type="number" class="form-control"
                                   th:field="*{variants[__${vIndex}__].storageGb}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Stock Qty</label>
                            <input type="number" class="form-control"
                                   th:field="*{variants[__${vIndex}__].stockQty}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Price</label>
                            <input type="number" step="0.01" class="form-control"
                                   th:field="*{variants[__${vIndex}__].price}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Import Price</label>
                            <input type="number" step="0.01" class="form-control"
                                   th:field="*{variants[__${vIndex}__].importPrice}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">SKU</label>
                            <input type="text" class="form-control"
                                   th:field="*{variants[__${vIndex}__].sku}">
                        </div>
                    </div>

                    <div class="mt-3">
                        <h5 class="mb-2">Images</h5>
                        <div th:each="image, iStat : *{variants[__${vIndex}__].images}" class="row g-2 align-items-end mb-2">
                            <div class="col-md-7">
                                <label class="form-label">URL</label>
                                <input type="text" class="form-control"
                                       th:field="*{variants[__${vIndex}__].images[__${iStat.index}__].url}">
                            </div>
                            <div class="col-md-2">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{variants[__${vIndex}__].images[__${iStat.index}__].isPrimary}">
                                    <label class="form-check-label">Primary</label>
                                </div>
                            </div>
                            <input type="hidden"
                                   th:field="*{variants[__${vIndex}__].images[__${iStat.index}__].imageId}">
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/products}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
