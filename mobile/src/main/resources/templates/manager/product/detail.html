<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manager - Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="mb-3 d-flex gap-2">
        <a class="btn btn-outline-secondary" th:href="@{/admin/products}">Back</a>
        <a class="btn btn-outline-primary" th:href="@{/admin/products/{id}/edit(id=${product.productId})}">Edit</a>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between flex-wrap gap-3">
                <div>
                    <h2 class="mb-1" th:text="${product.name}">Product name</h2>
                    <div class="text-muted">
                        <span class="me-3" th:text="${product.brand}">Brand</span>
                        <span th:text="${product.status}">ACTIVE</span>
                    </div>
                </div>
                <div class="text-end">
                    <div><strong>ID:</strong> <span th:text="${product.productId}">1</span></div>
                    <div><strong>Category:</strong> <span th:text="${product.category != null ? product.category.name : '-'}">-</span></div>
                    <div><strong>Created:</strong> <span th:text="${product.createdAt}">2026-03-30</span></div>
                </div>
            </div>
            <hr>
            <p class="mb-0" th:text="${product.description != null ? product.description : 'No description'}">Description</p>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <strong>Variants</strong>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(product.variants)}" class="text-muted">No variants</div>
            <div th:each="variant : ${product.variants}" class="border rounded p-3 mb-3 bg-white">
                <div class="d-flex justify-content-between flex-wrap gap-2">
                    <div>
                        <h5 class="mb-1" th:text="${variant.sku != null ? variant.sku : 'Variant'}">Variant</h5>
                        <div class="text-muted">
                            <span class="me-3">Storage: <span th:text="${variant.storageGb}">128</span> GB</span>
                            <span class="me-3">Stock: <span th:text="${variant.stockQty}">0</span></span>
                            <span>Price: <span th:text="${variant.price}">0</span></span>
                        </div>
                    </div>
                    <div class="text-end">
                        <div><strong>Import:</strong> <span th:text="${variant.importPrice}">0</span></div>
                        <div><strong>Variant ID:</strong> <span th:text="${variant.variantId}">1</span></div>
                    </div>
                </div>

                <div class="mt-3">
                    <h6 class="mb-2">Images</h6>
                    <div th:if="${#lists.isEmpty(variant.images)}" class="text-muted">No images</div>
                    <div th:each="image : ${variant.images}" class="d-flex justify-content-between border rounded p-2 mb-2">
                        <div>
                            <div th:text="${image.url}">url</div>
                            <small class="text-muted" th:text="${image.imageId}">1</small>
                        </div>
                        <span class="badge text-bg-primary" th:if="${image.isPrimary}">Primary</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
