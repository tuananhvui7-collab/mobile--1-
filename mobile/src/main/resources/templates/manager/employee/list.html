<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý nhân viên - PhoneShop')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container ps-shell">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <div class="ps-soft-badge mb-2">Manager</div>
            <h1 class="ps-page-title mb-1">Quản lý nhân viên</h1>
            <div class="ps-page-subtitle">Tạo, sửa, khóa và đặt lại mật khẩu nhân viên.</div>
        </div>
        <a th:href="@{/admin/employees/create}" class="btn btn-primary ps-btn-pill">Thêm nhân viên</a>
    </div>

    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="ps-card overflow-hidden">
        <div class="table-responsive">
            <table class="table ps-table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">Họ tên</th>
                    <th>Email</th>
                    <th>Điện thoại</th>
                    <th>Lương</th>
                    <th>Trạng thái</th>
                    <th>Ngày vào</th>
                    <th class="text-end pe-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${employees == null or employees.isEmpty()}">
                    <td colspan="7" class="text-center text-muted py-4">Chưa có nhân viên nào.</td>
                </tr>
                <tr th:each="employee : ${employees}">
                    <td class="ps-4">
                        <div class="fw-semibold" th:text="${employee.fullName}">Employee</div>
                        <div class="ps-muted small" th:text="${employee.userID}">0</div>
                    </td>
                    <td th:text="${employee.email}">email</td>
                    <td th:text="${employee.phone != null ? employee.phone : '—'}">—</td>
                    <td th:text="${employee.salary != null ? #numbers.formatDecimal(employee.salary, 0, 'COMMA', 0, 'POINT') + ' đ' : '—'}">—</td>
                    <td>
                        <span class="badge" th:classappend="${employee.isActive} ? ' text-bg-success' : ' text-bg-secondary'" th:text="${employee.isActive ? 'ACTIVE' : 'INACTIVE'}">ACTIVE</span>
                    </td>
                    <td th:text="${employee.hireDate != null ? #temporals.format(employee.hireDate, 'dd/MM/yyyy') : '—'}">—</td>
                    <td class="text-end pe-4">
                        <div class="d-flex flex-wrap gap-2 justify-content-end">
                            <a th:href="@{/admin/employees/{id}(id=${employee.userID})}" class="btn btn-sm btn-outline-secondary">Chi tiết</a>
                            <a th:href="@{/admin/employees/{id}/edit(id=${employee.userID})}" class="btn btn-sm btn-outline-primary">Sửa</a>
                            <form th:if="${employee.isActive}" th:action="@{/admin/employees/{id}/deactivate(id=${employee.userID})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Khóa</button>
                            </form>
                            <form th:if="${!employee.isActive}" th:action="@{/admin/employees/{id}/activate(id=${employee.userID})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-success">Mở khóa</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
