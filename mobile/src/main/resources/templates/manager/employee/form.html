<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${employee != null ? 'Sửa nhân viên - PhoneShop' : 'Thêm nhân viên - PhoneShop'})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container ps-shell" style="max-width: 860px;">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <div class="ps-soft-badge mb-2">Manager</div>
            <h1 class="ps-page-title mb-1" th:text="${employee != null ? 'Sửa nhân viên' : 'Thêm nhân viên'}">Thêm nhân viên</h1>
            <div class="ps-page-subtitle">Quản lý hồ sơ, lương và trạng thái tài khoản nhân viên.</div>
        </div>
        <a th:href="@{/admin/employees}" class="btn btn-outline-secondary ps-btn-pill">Quay lại</a>
    </div>

    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="ps-card p-4 p-lg-5">
        <form th:action="@{/admin/employees/save}" method="post" class="row g-3">
            <input type="hidden" name="employeeId" th:value="${employee != null ? employee.userID : ''}">
            <div class="col-md-6">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control form-control-lg" th:value="${employee != null ? employee.email : ''}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold" th:text="${employee != null ? 'Mật khẩu mới (để trống nếu không đổi)' : 'Mật khẩu'}">Mật khẩu</label>
                <input type="password" name="password" class="form-control form-control-lg" th:required="${employee == null}">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Họ và tên</label>
                <input type="text" name="fullName" class="form-control form-control-lg" th:value="${employee != null ? employee.fullName : ''}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Số điện thoại</label>
                <input type="tel" name="phone" class="form-control form-control-lg" th:value="${employee != null ? employee.phone : ''}">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Lương</label>
                <input type="number" name="salary" class="form-control form-control-lg" min="0" step="1000" th:value="${employee != null and employee.salary != null ? employee.salary : ''}">
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" role="switch" id="activeSwitch" name="active" value="true" th:checked="${employee == null or employee.isActive}">
                    <label class="form-check-label fw-semibold" for="activeSwitch">Kích hoạt tài khoản</label>
                </div>
            </div>
            <div class="col-12">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary btn-lg ps-btn-pill" th:text="${employee != null ? 'Lưu thay đổi' : 'Tạo nhân viên'}">Lưu</button>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
