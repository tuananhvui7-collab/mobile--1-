<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Chi tiết nhân viên - PhoneShop')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container ps-shell" style="max-width: 920px;">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <div class="ps-soft-badge mb-2">Manager</div>
            <h1 class="ps-page-title mb-1" th:text="${employee.fullName}">Nhân viên</h1>
            <div class="ps-page-subtitle" th:text="${employee.email}">email</div>
        </div>
        <a th:href="@{/admin/employees}" class="btn btn-outline-secondary ps-btn-pill">Quay lại</a>
    </div>

    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="ps-card p-4">
                <h2 class="h5 fw-bold mb-3">Thông tin nhân viên</h2>
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="ps-muted small text-uppercase fw-semibold">Mã nhân viên</div>
                        <div class="fw-semibold" th:text="${employee.userID}">0</div>
                    </div>
                    <div class="col-md-6">
                        <div class="ps-muted small text-uppercase fw-semibold">Trạng thái</div>
                        <div class="fw-semibold" th:text="${employee.isActive ? 'ACTIVE' : 'INACTIVE'}">ACTIVE</div>
                    </div>
                    <div class="col-md-6">
                        <div class="ps-muted small text-uppercase fw-semibold">Điện thoại</div>
                        <div class="fw-semibold" th:text="${employee.phone != null ? employee.phone : '—'}">—</div>
                    </div>
                    <div class="col-md-6">
                        <div class="ps-muted small text-uppercase fw-semibold">Lương</div>
                        <div class="fw-semibold" th:text="${employee.salary != null ? #numbers.formatDecimal(employee.salary, 0, 'COMMA', 0, 'POINT') + ' đ' : '—'}">—</div>
                    </div>
                    <div class="col-md-6">
                        <div class="ps-muted small text-uppercase fw-semibold">Ngày vào</div>
                        <div class="fw-semibold" th:text="${employee.hireDate != null ? #temporals.format(employee.hireDate, 'dd/MM/yyyy HH:mm') : '—'}">—</div>
                    </div>
                    <div class="col-md-6">
                        <div class="ps-muted small text-uppercase fw-semibold">Ngày tạo</div>
                        <div class="fw-semibold" th:text="${employee.createdAt != null ? #temporals.format(employee.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">—</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="ps-card p-4 mb-4">
                <h2 class="h5 fw-bold mb-3">Thao tác nhanh</h2>
                <div class="d-flex flex-wrap gap-2">
                    <a th:href="@{/admin/employees/{id}/edit(id=${employee.userID})}" class="btn btn-primary ps-btn-pill">Chỉnh sửa</a>
                    <form th:if="${employee.isActive}" th:action="@{/admin/employees/{id}/deactivate(id=${employee.userID})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-danger ps-btn-pill">Khóa tài khoản</button>
                    </form>
                    <form th:if="${!employee.isActive}" th:action="@{/admin/employees/{id}/activate(id=${employee.userID})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-success ps-btn-pill">Kích hoạt</button>
                    </form>
                </div>
            </div>

            <div class="ps-card p-4">
                <h2 class="h5 fw-bold mb-3">Đặt lại mật khẩu</h2>
                <form th:action="@{/admin/employees/{id}/reset-password(id=${employee.userID})}" method="post" class="vstack gap-3">
                    <div>
                        <label class="form-label fw-semibold">Mật khẩu mới</label>
                        <input type="password" name="newPassword" class="form-control form-control-lg" placeholder="Nhập mật khẩu mới">
                    </div>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-warning ps-btn-pill">Đặt lại mật khẩu</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
