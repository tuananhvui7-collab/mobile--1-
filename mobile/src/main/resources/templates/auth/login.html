<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"> <!--Cho phép sử dụng cú pháp thymeleaf-->
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập — PhoneShop</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 420px;">
    <h3 class="text-center mb-4">Đăng nhập PhoneShop</h3>

    <!-- Hiển thị khi có ?registered=true trong URL -->
    <div th:if="${param.registered}" class="alert alert-success">
        Đăng ký thành công! Hãy đăng nhập.
    </div>

    <!-- Hiển thị khi Spring Security trả về ?error -->
    <div th:if="${param.error}" class="alert alert-danger">
        Sai email hoặc mật khẩu! Vui lòng thử lại.
    </div>

    <!-- QUAN TRỌNG: action phải là /login, method phải là POST -->
    <!-- Spring Security tự xử lý POST /login -->
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <!-- PHẢI có name="username" — Spring Security yêu cầu -->
            <input type="email" name="username"
                   class="form-control" placeholder="email@example.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <!-- PHẢI có name="password" — Spring Security yêu cầu -->
            <input type="password" name="password"
                   class="form-control" placeholder="Nhập mật khẩu" required>
        </div>
        <!-- CSRF token: BẮT BUỘC trong MỌI form POST, nếu thiếu → lỗi 403 -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">       <!-- Bắt buộc trong mọi form POST để tránh lỗi 403. Spring Security tự sinh _csrf.token và _csrf.parameterName.-->
        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
    </form>

    <p class="mt-3 text-center">
        Chưa có tài khoản?
        <a th:href="@{/register}">Đăng ký ngay</a> <!-- th: href-->
    </p>
</div>
</body>
</html>
