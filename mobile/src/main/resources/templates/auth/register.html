<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng ký - PhoneShop')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4 py-lg-5">
    <div class="row g-4 align-items-center">
        <div class="col-lg-5">
            <div class="ps-card p-4 p-lg-5">
                <div class="ps-soft-badge mb-3">Create account</div>
                <h1 class="display-6 fw-bold mb-3">Tạo tài khoản mua sắm mới.</h1>
                <p class="ps-muted mb-4">
                    Đăng ký để lưu địa chỉ, theo dõi đơn, viết đánh giá và gửi phản hồi cho shop.
                </p>
                <img th:src="@{/assets/img/banner_img_02.jpg}" class="img-fluid rounded-4" alt="Register">
            </div>
        </div>
        <div class="col-lg-6 offset-lg-1">
            <div class="ps-card p-4 p-lg-5">
                <div th:replace="~{fragments/layout :: flash}"></div>
                <h2 class="h3 fw-bold mb-2">Đăng ký tài khoản</h2>
                <p class="ps-muted mb-4">Điền thông tin cơ bản để bắt đầu.</p>
                <div th:if="${error}" class="alert alert-danger ps-alert" th:text="${error}"></div>

                <form th:action="@{/register}" method="post" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Họ và tên</label>
                        <input type="text" name="fullName" class="form-control form-control-lg" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input type="tel" name="phone" class="form-control form-control-lg">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Mật khẩu</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>
                    <div class="col-12">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-success btn-lg w-100 ps-btn-pill">Đăng ký</button>
                    </div>
                </form>

                <p class="mt-4 mb-0 text-center">
                    Đã có tài khoản?
                    <a th:href="@{/login}" class="fw-semibold">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
