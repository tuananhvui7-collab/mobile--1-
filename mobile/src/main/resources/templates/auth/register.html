<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Dang ky</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
    <h3 class="text-center mb-4">Dang ky tai khoan</h3>

    <!-- Hien thi loi neu co (tu Controller truyen vao Model) -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label">Ho va ten</label>
            <input type="text" name="fullName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">So dien thoai</label>
            <input type="tel" name="phone" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Mat khau</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <!-- CSRF token bat buoc -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">
        <button type="submit" class="btn btn-success w-100">Dang ky</button>
    </form>

    <p class="mt-3 text-center">
        Da co tai khoan? <a th:href="@{/login}">Dang nhap</a>
    </p>
</div>
</body></html>
