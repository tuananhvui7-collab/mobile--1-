<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sản phẩm - PhoneShop')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container ps-shell">
    <section class="ps-hero ps-hero-soft p-4 p-lg-5 mb-4">
        <div class="row align-items-center g-4">
            <div class="col-lg-8">
                <div class="ps-soft-badge mb-3">Danh mục sản phẩm</div>
                <h1 class="ps-page-title mb-2">Chọn chiếc máy phù hợp với bạn.</h1>
                <p class="ps-page-subtitle mb-0 text-white-50">
                    Tìm kiếm theo tên hoặc hãng, duyệt danh sách responsive và mở chi tiết trong một cú nhấp.
                </p>
            </div>
            <div class="col-lg-4">
                <div class="ps-card p-3 p-lg-4 bg-white">
                    <div class="small text-uppercase text-muted fw-bold">Tìm kiếm nhanh</div>
                    <form th:action="@{/products}" method="get" class="mt-3 row g-2">
                        <div class="col-12">
                            <input type="text" name="keyword" th:value="${keyword}" class="form-control form-control-lg" placeholder="Tìm theo tên hoặc hãng...">
                        </div>
                        <div class="col-12 d-grid">
                            <button type="submit" class="btn btn-primary btn-lg ps-btn-pill">Tìm sản phẩm</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div th:if="${products.content.isEmpty()}" class="alert alert-light border ps-alert">
        Không có sản phẩm phù hợp.
    </div>

    <div class="row g-3 g-lg-4" th:if="${!products.content.isEmpty()}">
        <div class="col-12 col-sm-6 col-lg-3" th:each="product : ${products.content}">
            <div class="ps-card ps-card-hover h-100 overflow-hidden">
                <div class="ratio ratio-4x3 bg-light">
                    <img th:src="@{/assets/img/shop_01.jpg}" class="ps-image-cover" alt="Product">
                </div>
                <div class="p-3 p-lg-4">
                    <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                        <span class="ps-soft-badge" th:text="${product.brand != null ? product.brand : 'PhoneShop'}">Brand</span>
                        <span class="small ps-muted" th:text="${product.category != null ? product.category.name : '—'}">Category</span>
                    </div>
                    <h2 class="h6 fw-bold mb-2 text-truncate" th:text="${product.name}">Tên sản phẩm</h2>
                    <p class="ps-muted small mb-3" th:text="${product.description != null ? product.description : 'Chưa có mô tả'}">Mô tả</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <a th:href="@{/products/{id}(id=${product.productId})}" class="btn btn-primary btn-sm ps-btn-pill">Xem chi tiết</a>
                        <span class="small ps-muted">ID #<span th:text="${product.productId}">1</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${products.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${products.first} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/products(page=${products.number - 1}, keyword=${keyword})}">Trước</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${'Trang ' + (products.number + 1) + ' / ' + products.totalPages}">1 / 1</span>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/products(page=${products.number + 1}, keyword=${keyword})}">Sau</a>
            </li>
        </ul>
    </nav>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
