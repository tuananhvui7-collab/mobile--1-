<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sản phẩm - PhoneShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; color: #0f172a; }
        .card-product { border: 1px solid #e2e8f0; border-radius: 1rem; overflow: hidden; background: #fff; }
        .thumb { height: 180px; background: #eef2ff; display: flex; align-items: center; justify-content: center; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
<main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
        <h1 class="h3 mb-0">Sản phẩm</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">Trang chủ</a>
            <a th:href="@{/login}" class="btn btn-outline-primary btn-sm">Đăng nhập</a>
        </div>
    </div>

    <form th:action="@{/products}" method="get" class="row g-2 mb-4">
        <div class="col-md-10">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm theo tên hoặc hãng...">
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary">Tìm</button>
        </div>
    </form>

    <div th:if="${products.content.isEmpty()}" class="alert alert-light border">
        Không có sản phẩm phù hợp.
    </div>

    <div class="row g-3" th:if="${!products.content.isEmpty()}">
        <div class="col-12 col-sm-6 col-lg-3" th:each="product : ${products.content}">
            <div class="card-product h-100">
                <div class="thumb">
                    <img src="/assets/img/about-hero.svg" alt="PhoneShop">
                </div>
                <div class="p-3">
                    <div class="small text-primary fw-semibold text-uppercase mb-1"
                         th:text="${product.brand != null ? product.brand : 'PhoneShop'}">Brand</div>
                    <h2 class="h6 mb-2" th:text="${product.name}">Tên sản phẩm</h2>
                    <p class="text-muted small mb-3"
                       th:text="${product.description != null ? product.description : 'Chưa có mô tả'}">Mô tả</p>
                    <a th:href="@{/products/{id}(id=${product.productId})}"
                       class="btn btn-outline-primary btn-sm">Xem chi tiết</a>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${products.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${products.first} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/products(page=${products.number - 1}, keyword=${keyword})}">Trước</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${'Trang ' + (products.number + 1) + ' / ' + products.totalPages}">1 / 1</span>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/products(page=${products.number + 1}, keyword=${keyword})}">Sau</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
