<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiet san pham</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <a th:href="@{/products}" class="btn btn-link px-0 mb-3">&larr; Quay lai danh sach</a>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="row g-4">
                <div class="col-lg-7">
                    <h2 class="mb-2" th:text="${product.name}">Ten san pham</h2>
                    <div class="text-muted mb-3">
                        <span class="me-3" th:text="${product.brand}">Thuong hieu</span>
                        <span th:text="${product.status}">ACTIVE</span>
                    </div>

                    <p th:if="${product.description != null and !product.description.isBlank()}"
                       th:text="${product.description}">
                        Mo ta san pham
                    </p>
                    <p th:if="${product.description == null or product.description.isBlank()}"
                       class="text-muted">
                        Chua co mo ta cho san pham nay.
                    </p>
                </div>

                <div class="col-lg-5">
                    <div class="border rounded p-3 bg-white">
                        <h5 class="mb-3">Thong tin co ban</h5>
                        <dl class="row mb-0">
                            <dt class="col-5">Ma san pham</dt>
                            <dd class="col-7" th:text="${product.productId}">1</dd>

                            <dt class="col-5">Danh muc</dt>
                            <dd class="col-7" th:text="${product.category != null ? product.category.name : 'Chua co'}">Chua co</dd>

                            <dt class="col-5">Ngay tao</dt>
                            <dd class="col-7" th:text="${product.createdAt}">2026-03-24T00:00</dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
