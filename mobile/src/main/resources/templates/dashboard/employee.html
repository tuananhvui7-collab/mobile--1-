<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #eef2ff 0%, #dbeafe 100%); }
        .hero-card {
            background: linear-gradient(135deg, #111827 0%, #0f766e 100%);
            color: #fff;
            border: none;
            border-radius: 1.25rem;
        }
        .quick-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 28px rgba(15, 23, 42, .08);
            transition: transform .18s ease;
        }
        .quick-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body>
<div class="container py-4 py-lg-5">
    <div class="hero-card p-4 p-md-5 mb-4">
        <div class="row align-items-center g-4">
            <div class="col-lg-8">
                <span class="badge bg-light text-success mb-3">Employee</span>
                <h1 class="display-6 fw-bold mb-3">Khu xử lý nghiệp vụ</h1>
                <p class="lead mb-0">Điểm vào cho nhân viên: xem đơn hàng, xử lý phản hồi khách hàng và cập nhật trạng thái.</p>
            </div>
            <div class="col-lg-4 text-lg-end">
                <a th:href="@{/employee/orders}" class="btn btn-light btn-lg me-2">Đơn hàng</a>
                <a th:href="@{/employee/feedbacks}" class="btn btn-outline-light btn-lg">Phản hồi</a>
            </div>
        </div>
    </div>

    <div class="row g-3 g-lg-4">
        <div class="col-md-6">
            <a th:href="@{/employee/orders}" class="text-decoration-none">
                <div class="quick-card bg-white p-4 h-100">
                    <h5 class="mb-2 text-dark">Đơn hàng</h5>
                    <p class="text-muted mb-0">Xem và cập nhật trạng thái đơn của khách hàng.</p>
                </div>
            </a>
        </div>
        <div class="col-md-6">
            <a th:href="@{/employee/feedbacks}" class="text-decoration-none">
                <div class="quick-card bg-white p-4 h-100">
                    <h5 class="mb-2 text-dark">Phản hồi khách hàng</h5>
                    <p class="text-muted mb-0">Nhận và xử lý các ticket hỗ trợ.</p>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
