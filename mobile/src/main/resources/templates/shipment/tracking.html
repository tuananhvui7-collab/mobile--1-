<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Theo dõi đơn hàng - PhoneShop')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container ps-shell">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <div>
            <div class="ps-soft-badge mb-2">Tracking</div>
            <h1 class="ps-page-title mb-1">Theo dõi vận chuyển</h1>
            <div class="ps-page-subtitle" th:text="${order.orderCode}">ORD-0000</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/orders/{id}(id=${order.orderId})}" class="btn btn-outline-secondary ps-btn-pill">Quay lại đơn hàng</a>
            <form th:action="@{/orders/{id}/tracking/refresh(id=${order.orderId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary ps-btn-pill">Đồng bộ từ GHN</button>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="ps-card p-4 mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <div class="ps-muted small text-uppercase fw-semibold">Trạng thái đơn</div>
                <div class="fw-semibold" th:text="${order.status}">PENDING</div>
            </div>
            <div class="col-md-4">
                <div class="ps-muted small text-uppercase fw-semibold">Trạng thái vận chuyển</div>
                <div class="fw-semibold" th:text="${shipment != null ? shipment.status : 'CHỜ TẠO VẬN ĐƠN'}">—</div>
            </div>
            <div class="col-md-4">
                <div class="ps-muted small text-uppercase fw-semibold">Đơn vị vận chuyển</div>
                <div class="fw-semibold" th:text="${shipment != null ? shipment.carrier : 'GHN'}">GHN</div>
            </div>
            <div class="col-md-4">
                <div class="ps-muted small text-uppercase fw-semibold">Mã nội bộ</div>
                <div class="fw-semibold" th:text="${shipment != null ? shipment.clientOrderCode : order.orderCode}">—</div>
            </div>
            <div class="col-md-4">
                <div class="ps-muted small text-uppercase fw-semibold">Mã GHN</div>
                <div class="fw-semibold" th:text="${shipment != null and shipment.ghnOrderCode != null ? shipment.ghnOrderCode : '—'}">—</div>
            </div>
            <div class="col-md-4">
                <div class="ps-muted small text-uppercase fw-semibold">Cập nhật cuối</div>
                <div class="fw-semibold" th:text="${shipment != null and shipment.lastSyncedAt != null ? #temporals.format(shipment.lastSyncedAt, 'dd/MM/yyyy HH:mm') : '—'}">—</div>
            </div>
            <div class="col-12">
                <div class="ps-muted small text-uppercase fw-semibold">Thông báo</div>
                <div class="fw-semibold" th:text="${shipment != null and shipment.statusMessage != null ? shipment.statusMessage : 'Đang chờ đơn vị vận chuyển cập nhật.'}">—</div>
            </div>
            <div class="col-12" th:if="${shipment != null and shipment.trackingUrl != null}">
                <div class="ps-muted small text-uppercase fw-semibold">Link theo dõi GHN</div>
                <a th:href="${shipment.trackingUrl}" target="_blank" rel="noopener" th:text="${shipment.trackingUrl}">—</a>
            </div>
        </div>
    </div>

    <div class="ps-card p-4">
        <h2 class="h5 fw-bold mb-3">Lộ trình</h2>
        <div th:if="${events == null or events.isEmpty()}" class="alert alert-info ps-alert mb-0">
            Chưa có dữ liệu lộ trình từ GHN.
        </div>
        <div th:if="${events != null and !events.isEmpty()}" class="table-responsive">
            <table class="table ps-table table-bordered align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Thời gian</th>
                    <th>Trạng thái</th>
                    <th>Nhóm</th>
                    <th>Khu vực</th>
                    <th>Mô tả</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="event : ${events}">
                    <td th:text="${event.occurredAt != null ? #temporals.format(event.occurredAt, 'dd/MM/yyyy HH:mm') : '—'}">—</td>
                    <td><span class="badge bg-secondary" th:text="${event.shipmentStatus != null ? event.shipmentStatus : '—'}">—</span></td>
                    <td th:text="${event.eventType != null ? event.eventType : '—'}">—</td>
                    <td th:text="${event.warehouse != null ? event.warehouse : '—'}">—</td>
                    <td th:text="${event.description != null ? event.description : '—'}">—</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
