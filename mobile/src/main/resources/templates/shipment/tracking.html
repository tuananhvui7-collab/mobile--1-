<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Theo dõi đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <div>
            <h3 class="mb-0">Theo dõi vận chuyển</h3>
            <div class="text-muted small" th:text="${order.orderCode}">ORD-0000</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/orders/{id}(id=${order.orderId})}" class="btn btn-outline-secondary">Quay lại đơn hàng</a>
            <form th:action="@{/orders/{id}/tracking/refresh(id=${order.orderId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary">Đồng bộ từ GHN</button>
            </form>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="text-muted small">Trạng thái đơn</div>
                    <div class="fw-semibold" th:text="${order.status}">PENDING</div>
                </div>
                <div class="col-md-4">
                    <div class="text-muted small">Trạng thái vận chuyển</div>
                    <div class="fw-semibold" th:text="${shipment != null ? shipment.status : 'CHỜ TẠO VẬN ĐƠN'}">—</div>
                </div>
                <div class="col-md-4">
                    <div class="text-muted small">Đơn vị vận chuyển</div>
                    <div class="fw-semibold" th:text="${shipment != null ? shipment.carrier : 'GHN'}">GHN</div>
                </div>
                <div class="col-md-4">
                    <div class="text-muted small">Mã nội bộ</div>
                    <div class="fw-semibold" th:text="${shipment != null ? shipment.clientOrderCode : order.orderCode}">—</div>
                </div>
                <div class="col-md-4">
                    <div class="text-muted small">Mã GHN</div>
                    <div class="fw-semibold" th:text="${shipment != null and shipment.ghnOrderCode != null ? shipment.ghnOrderCode : '—'}">—</div>
                </div>
                <div class="col-md-4">
                    <div class="text-muted small">Cập nhật cuối</div>
                    <div class="fw-semibold" th:text="${shipment != null and shipment.lastSyncedAt != null ? #temporals.format(shipment.lastSyncedAt, 'dd/MM/yyyy HH:mm') : '—'}">—</div>
                </div>
                <div class="col-12">
                    <div class="text-muted small">Thông báo</div>
                    <div class="fw-semibold" th:text="${shipment != null and shipment.statusMessage != null ? shipment.statusMessage : 'Đang chờ đơn vị vận chuyển cập nhật.'}">—</div>
                </div>
                <div class="col-12" th:if="${shipment != null and shipment.trackingUrl != null}">
                    <div class="text-muted small">Link theo dõi GHN</div>
                    <a th:href="${shipment.trackingUrl}" target="_blank" rel="noopener" th:text="${shipment.trackingUrl}">—</a>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title mb-3">Lộ trình</h5>
            <div th:if="${events == null or events.isEmpty()}" class="alert alert-info mb-0">
                Chưa có dữ liệu lộ trình từ GHN.
            </div>
            <div th:if="${events != null and !events.isEmpty()}" class="table-responsive">
                <table class="table table-bordered align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th>Nhóm</th>
                        <th>Khu vực</th>
                        <th>Mô tả</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="event : ${events}">
                        <td th:text="${event.occurredAt != null ? #temporals.format(event.occurredAt, 'dd/MM/yyyy HH:mm') : '—'}">—</td>
                        <td>
                            <span class="badge bg-secondary" th:text="${event.shipmentStatus != null ? event.shipmentStatus : '—'}">—</span>
                        </td>
                        <td th:text="${event.eventType != null ? event.eventType : '—'}">—</td>
                        <td th:text="${event.warehouse != null ? event.warehouse : '—'}">—</td>
                        <td th:text="${event.description != null ? event.description : '—'}">—</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
