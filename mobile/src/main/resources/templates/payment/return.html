<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4" style="max-width: 780px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="mb-3">Kết quả thanh toán VNPAY</h3>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

            <div th:if="${payment != null}" class="row g-3">
                <div class="col-md-6">
                    <div class="text-muted small">Mã thanh toán</div>
                    <div class="fw-semibold" th:text="${payment.paymentId}">1</div>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small">Mã đơn hàng</div>
                    <div class="fw-semibold" th:text="${order.orderCode}">ORD</div>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small">Trạng thái thanh toán</div>
                    <div class="fw-semibold" th:text="${payment.status}">SUCCESS</div>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small">Mã phản hồi</div>
                    <div class="fw-semibold" th:text="${payment.responseCode != null ? payment.responseCode : rspCode}">00</div>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small">Mã giao dịch VNPAY</div>
                    <div class="fw-semibold" th:text="${payment.gatewayTransactionNo != null ? payment.gatewayTransactionNo : '—'}">—</div>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small">Mã giao dịch ngân hàng</div>
                    <div class="fw-semibold" th:text="${payment.bankTransactionNo != null ? payment.bankTransactionNo : '—'}">—</div>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small">Ngân hàng</div>
                    <div class="fw-semibold" th:text="${payment.bankCode != null ? payment.bankCode : '—'}">—</div>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small">Loại thẻ</div>
                    <div class="fw-semibold" th:text="${payment.cardType != null ? payment.cardType : '—'}">—</div>
                </div>
                <div class="col-12">
                    <a th:href="@{/orders/{id}(id=${order.orderId})}" class="btn btn-primary">Xem đơn hàng</a>
                    <a th:href="@{/payments/{id}(id=${payment.paymentId})}" class="btn btn-outline-secondary">Xem thanh toán</a>
                </div>
            </div>

            <div th:if="${payment == null}" class="text-muted">
                Không có dữ liệu thanh toán để hiển thị.
            </div>
        </div>
    </div>
</div>
</body>
</html>
