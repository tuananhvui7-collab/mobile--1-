<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Thanh toán VNPAY mô phỏng - PhoneShop')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container ps-shell" style="max-width: 880px;">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <div class="ps-soft-badge mb-2">VNPAY Dev</div>
            <h1 class="ps-page-title mb-1">Cổng thanh toán mô phỏng</h1>
            <div class="ps-page-subtitle">Dùng cho localhost khi chưa có callback public.</div>
        </div>
        <a th:href="@{/payments/{id}(id=${payment.paymentId})}" class="btn btn-outline-secondary ps-btn-pill">Quay lại thanh toán</a>
    </div>

    <div class="ps-card p-4 mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <div class="ps-muted small text-uppercase fw-semibold">Mã thanh toán</div>
                <div class="fw-semibold" th:text="${payment.paymentId}">0</div>
            </div>
            <div class="col-md-4">
                <div class="ps-muted small text-uppercase fw-semibold">Đơn hàng</div>
                <div class="fw-semibold" th:text="${order.orderCode}">ORD</div>
            </div>
            <div class="col-md-4">
                <div class="ps-muted small text-uppercase fw-semibold">Trạng thái hiện tại</div>
                <div class="fw-semibold" th:text="${payment.status}">PENDING</div>
            </div>
            <div class="col-12">
                <div class="ps-muted small text-uppercase fw-semibold">Ghi chú</div>
                <div class="fw-semibold">Bạn có thể bấm xác nhận thành công hoặc thất bại để test flow nội bộ.</div>
            </div>
        </div>
    </div>

    <div class="ps-card p-4">
        <h2 class="h5 fw-bold mb-3">Thao tác mô phỏng</h2>
        <div class="d-flex flex-wrap gap-2">
            <form th:action="@{/payments/{id}/vnpay/mock/confirm(id=${payment.paymentId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-success btn-lg ps-btn-pill">Thanh toán thành công</button>
            </form>
            <form th:action="@{/payments/{id}/vnpay/mock/fail(id=${payment.paymentId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-danger btn-lg ps-btn-pill">Thanh toán thất bại</button>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
